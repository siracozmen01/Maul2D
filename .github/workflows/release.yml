name: release

# Tag push = prebuilt static libraries attached to the GitHub
# release: install tree (lib + headers + cmake package + pkg-config)
# per platform, straight from the same sources the gates just ran.
# The tag name only ever enters shell steps through a quoted
# environment variable (workflow-injection hygiene).
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  package:
    name: package ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: linux-x64, os: ubuntu-latest, archive: tar }
          - { name: windows-x64, os: windows-latest, archive: zip }
          - { name: macos-arm64, os: macos-latest, archive: tar }
    env:
      TAG: ${{ github.ref_name }}
      PLATFORM: ${{ matrix.name }}
    steps:
      - uses: actions/checkout@v4
      - name: configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
      - name: build
        run: cmake --build build --config Release -j 4
      - name: install
        shell: bash
        run: cmake --install build --config Release --prefix "stage/maul2d-$TAG-$PLATFORM"
      - name: archive (tar)
        if: matrix.archive == 'tar'
        working-directory: stage
        shell: bash
        run: tar czf "../maul2d-$TAG-$PLATFORM.tar.gz" "maul2d-$TAG-$PLATFORM"
      - name: archive (zip)
        if: matrix.archive == 'zip'
        working-directory: stage
        shell: bash
        run: 7z a "../maul2d-$TAG-$PLATFORM.zip" "maul2d-$TAG-$PLATFORM"
      - name: ensure the release exists
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh release view "$TAG" || gh release create "$TAG" --title "$TAG" --generate-notes || true
      - name: upload to the release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          FILE=$(ls "maul2d-$TAG-$PLATFORM."*)
          gh release upload "$TAG" "$FILE" --clobber

  testbed:
    name: package testbed ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: linux-x64, os: ubuntu-latest }
          - { name: windows-x64, os: windows-latest }
    env:
      TAG: ${{ github.ref_name }}
      PLATFORM: ${{ matrix.name }}
    steps:
      - uses: actions/checkout@v4
      - name: install X11 (linux testbed viewer)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev
      - name: configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DMAUL2D_TESTBED=ON
      - name: build
        run: cmake --build build --config Release --target testbed -j 4
      - name: stage and archive
        shell: bash
        run: |
          mkdir -p stage
          if [ "$PLATFORM" = "windows-x64" ]; then
            cp build/testbed/Release/testbed.exe "stage/Maul2D-testbed.exe" 2>/dev/null || cp build/testbed/testbed.exe "stage/Maul2D-testbed.exe"
            cd stage && 7z a "../Maul2D-testbed-$TAG-$PLATFORM.zip" "Maul2D-testbed.exe"
          else
            cp build/testbed/testbed "stage/Maul2D-testbed"
            cd stage && tar czf "../Maul2D-testbed-$TAG-$PLATFORM.tar.gz" "Maul2D-testbed"
          fi
      - name: ensure the release exists
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh release view "$TAG" || gh release create "$TAG" --title "$TAG" --generate-notes || true
      - name: upload to the release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          FILE=$(ls "Maul2D-testbed-$TAG-$PLATFORM."*)
          gh release upload "$TAG" "$FILE" --clobber
