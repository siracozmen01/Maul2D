name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: linux-x64-gcc,     os: ubuntu-latest,    cc: gcc,   config: Release }
          - { name: linux-x64-clang,   os: ubuntu-latest,    cc: clang, config: Release }
          - { name: linux-arm64-gcc,   os: ubuntu-24.04-arm, cc: gcc,   config: Release }
          - { name: linux-arm64-clang, os: ubuntu-24.04-arm, cc: clang, config: Release }
          - { name: macos-arm64-clang, os: macos-latest,     cc: clang, config: Release }
          - { name: windows-x64-msvc,  os: windows-latest,   cc: cl,    config: Release }
          # The seventh cell: MSVC Debug must produce the same bits as
          # every Release cell - Debug==Release is a law, not a habit.
          - { name: windows-x64-msvc-debug, os: windows-latest, cc: cl, config: Debug }
          # Eighth cell: ARM64 Windows. The compare-select carve-out in
          # math.h is proven here, not assumed.
          - { name: windows-arm64-msvc, os: windows-11-arm, cc: cl, config: Release }
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        shell: bash
        run: |
          if [ "${{ matrix.cc }}" = "cl" ]; then
            cmake -B build
          else
            cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.config }} -DCMAKE_C_COMPILER=${{ matrix.cc }}
          fi

      - name: Build
        shell: bash
        run: cmake --build build --config ${{ matrix.config }}

      - name: Run determinism gate
        shell: bash
        run: |
          if [ -d "build/${{ matrix.config }}" ]; then
            BIN="build/${{ matrix.config }}"
            SUFFIX=.exe
          else
            BIN=build
            SUFFIX=
          fi
          "$BIN/test_core$SUFFIX" | tee out.txt
          "$BIN/test_world$SUFFIX" | tee -a out.txt
          "$BIN/test_broadphase$SUFFIX" | tee -a out.txt
          "$BIN/test_shapes$SUFFIX" | tee -a out.txt
          "$BIN/test_contacts$SUFFIX" | tee -a out.txt
          "$BIN/test_solver$SUFFIX" | tee -a out.txt
          "$BIN/test_islands$SUFFIX" | tee -a out.txt
          "$BIN/test_ccd$SUFFIX" | tee -a out.txt
          "$BIN/test_events$SUFFIX" | tee -a out.txt
          "$BIN/test_joints$SUFFIX" | tee -a out.txt
          "$BIN/test_journal$SUFFIX" | tee -a out.txt
          "$BIN/test_queries$SUFFIX" | tee -a out.txt
          "$BIN/test_redteam$SUFFIX" | tee -a out.txt
          "$BIN/test_fuzz$SUFFIX" | tee -a out.txt
          "$BIN/test_threads$SUFFIX" | tee -a out.txt
          grep -E '^M2_(DET|WORLD|BP|SHAPE|CONTACT|SOLVER|ISLAND|CCD|EVENT|JOINT|JOURNAL|QUERY|CHAOS|THREAD|FUZZ)_HASH=' out.txt | tr -d '\r' > "hash-${{ matrix.name }}.txt"

      - uses: actions/upload-artifact@v4
        with:
          name: hash-${{ matrix.name }}
          path: hash-${{ matrix.name }}.txt

  compare-hashes:
    name: cross-platform hash equality
    needs: [build-test, sanitize]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: hashes
          pattern: hash-*
          merge-multiple: true
      - name: Compare
        shell: bash
        run: |
          grep -hE '^M2_(DET|WORLD|BP|SHAPE|CONTACT|SOLVER|ISLAND|CCD|EVENT|JOINT|JOURNAL|QUERY|CHAOS|THREAD|FUZZ)_HASH=' hashes/*.txt | tee all-hashes.txt
          CELLS=9
          # Every distinct hash line must appear exactly once per cell:
          # a divergent cell or a silently missing line both fail.
          BAD=$(sort all-hashes.txt | uniq -c | awk -v n="$CELLS" '$1 != n' | wc -l)
          DISTINCT=$(sort -u all-hashes.txt | wc -l)
          if [ "$BAD" != "0" ] || [ "$DISTINCT" != "15" ]; then
            echo "DETERMINISM FAILURE: $DISTINCT distinct lines, $BAD with wrong cell count"
            exit 1
          fi
          echo "all cells produced identical bits for every gate"

  sanitize:
    name: asan+ubsan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        # Also the scalar-SIMD cell: its hashes join the cross-platform
        # gate, so the fmaf fallback must match the vector backends bit
        # for bit or this build is red.
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DMAUL2D_SANITIZE=ON -DMAUL2D_SIMD=scalar -DCMAKE_C_COMPILER=clang
      - name: Build
        run: cmake --build build
      - name: Run
        run: |
          ./build/test_core | tee out.txt
          ./build/test_world | tee -a out.txt
          ./build/test_broadphase | tee -a out.txt
          ./build/test_shapes | tee -a out.txt
          ./build/test_contacts | tee -a out.txt
          ./build/test_solver | tee -a out.txt
          ./build/test_islands | tee -a out.txt
          ./build/test_ccd | tee -a out.txt
          ./build/test_events | tee -a out.txt
          ./build/test_joints | tee -a out.txt
          ./build/test_journal | tee -a out.txt
          ./build/test_queries | tee -a out.txt
          ./build/test_redteam | tee -a out.txt
          ./build/test_fuzz | tee -a out.txt
          ./build/test_threads | tee -a out.txt
          grep -E '^M2_(DET|WORLD|BP|SHAPE|CONTACT|SOLVER|ISLAND|CCD|EVENT|JOINT|JOURNAL|QUERY|CHAOS|THREAD|FUZZ)_HASH=' out.txt | tr -d '\r' > hash-sanitize-scalar.txt
      - uses: actions/upload-artifact@v4
        with:
          name: hash-sanitize-scalar
          path: hash-sanitize-scalar.txt

  format:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check formatting
        # Version pinned: formatter verdicts drift across major versions
        # (the same lesson as pinning compilers for determinism).
        run: |
          pip install clang-format==22.1.5 >/dev/null
          clang-format --version
          clang-format --dry-run -Werror include/maul2d/*.h src/*.c test/*.c benchmark/*.c

  harness:
    name: dual-backend harness (reference)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DMAUL2D_BENCHMARKS=ON
      - name: Build
        run: cmake --build build
      - name: Run
        shell: bash
        run: |
          set -o pipefail
          ./build/benchmark/harness | tee harness-metrics.txt
      - uses: actions/upload-artifact@v4
        with:
          name: harness-metrics
          path: harness-metrics.txt
