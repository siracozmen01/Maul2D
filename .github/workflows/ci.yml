name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: linux-x64-gcc,     os: ubuntu-latest,    cc: gcc,   cxxflags: "" }
          - { name: linux-x64-clang,   os: ubuntu-latest,    cc: clang, cxxflags: "" }
          - { name: linux-arm64-gcc,   os: ubuntu-24.04-arm, cc: gcc,   cxxflags: "" }
          - { name: linux-arm64-clang, os: ubuntu-24.04-arm, cc: clang, cxxflags: "" }
          - { name: macos-arm64-clang, os: macos-latest,     cc: clang, cxxflags: "" }
          - { name: windows-x64-msvc,  os: windows-latest,   cc: cl,    cxxflags: "" }
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        shell: bash
        run: |
          if [ "${{ matrix.cc }}" = "cl" ]; then
            cmake -B build
          else
            cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=${{ matrix.cc }}
          fi

      - name: Build
        shell: bash
        run: cmake --build build --config Release

      - name: Run determinism gate
        shell: bash
        run: |
          if [ -d build/Release ]; then
            BIN=build/Release
            SUFFIX=.exe
          else
            BIN=build
            SUFFIX=
          fi
          "$BIN/test_core$SUFFIX" | tee out.txt
          "$BIN/test_world$SUFFIX" | tee -a out.txt
          "$BIN/test_broadphase$SUFFIX" | tee -a out.txt
          "$BIN/test_shapes$SUFFIX" | tee -a out.txt
          "$BIN/test_contacts$SUFFIX" | tee -a out.txt
          "$BIN/test_solver$SUFFIX" | tee -a out.txt
          "$BIN/test_islands$SUFFIX" | tee -a out.txt
          "$BIN/test_ccd$SUFFIX" | tee -a out.txt
          "$BIN/test_events$SUFFIX" | tee -a out.txt
          "$BIN/test_joints$SUFFIX" | tee -a out.txt
          grep -E '^M2_(DET|WORLD|BP|SHAPE|CONTACT|SOLVER|ISLAND|CCD|EVENT|JOINT)_HASH=' out.txt | tr -d '\r' > "hash-${{ matrix.name }}.txt"

      - uses: actions/upload-artifact@v4
        with:
          name: hash-${{ matrix.name }}
          path: hash-${{ matrix.name }}.txt

  compare-hashes:
    name: cross-platform hash equality
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: hashes
          pattern: hash-*
          merge-multiple: true
      - name: Compare
        shell: bash
        run: |
          grep -hE '^M2_(DET|WORLD|BP|SHAPE|CONTACT|SOLVER|ISLAND|CCD|EVENT|JOINT)_HASH=' hashes/*.txt | tee all-hashes.txt
          CELLS=6
          # Every distinct hash line must appear exactly once per cell:
          # a divergent cell or a silently missing line both fail.
          BAD=$(sort all-hashes.txt | uniq -c | awk -v n="$CELLS" '$1 != n' | wc -l)
          DISTINCT=$(sort -u all-hashes.txt | wc -l)
          if [ "$BAD" != "0" ] || [ "$DISTINCT" != "10" ]; then
            echo "DETERMINISM FAILURE: $DISTINCT distinct lines, $BAD with wrong cell count"
            exit 1
          fi
          echo "all cells produced identical bits for every gate"

  sanitize:
    name: asan+ubsan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DMAUL2D_SANITIZE=ON -DCMAKE_C_COMPILER=clang
      - name: Build
        run: cmake --build build
      - name: Run
        run: |
          ./build/test_core
          ./build/test_world
          ./build/test_broadphase
          ./build/test_shapes
          ./build/test_contacts
          ./build/test_solver
          ./build/test_islands
          ./build/test_ccd
          ./build/test_events
          ./build/test_joints

  format:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check formatting
        # Version pinned: formatter verdicts drift across major versions
        # (the same lesson as pinning compilers for determinism).
        run: |
          pip install clang-format==22.1.5 >/dev/null
          clang-format --version
          clang-format --dry-run -Werror include/maul2d/*.h src/*.c test/*.c benchmark/*.c

  harness:
    name: dual-backend harness (reference)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DMAUL2D_BENCHMARKS=ON
      - name: Build
        run: cmake --build build
      - name: Run
        shell: bash
        run: |
          set -o pipefail
          ./build/benchmark/harness | tee harness-metrics.txt
      - uses: actions/upload-artifact@v4
        with:
          name: harness-metrics
          path: harness-metrics.txt
